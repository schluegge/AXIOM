name: Apply issue 4 source patch

on:
  push:
    branches:
      - feature/4-structured-lvalue-mutation
    paths:
      - "tools/issue4.patch.part*"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Apply exact tested patch
        shell: bash
        run: |
          cat tools/issue4.patch.part* > /tmp/issue4.patch.gz.b64
          base64 --decode /tmp/issue4.patch.gz.b64 | gzip --decompress > /tmp/issue4.patch
          printf '%s  %s\n' '111b81ee79a4edb4b0799c77c48eec2c58321a25482d08ba874468d445bbf58b' /tmp/issue4.patch | sha256sum --check
          git apply --index /tmp/issue4.patch
          git checkout origin/main -- .github/workflows/proof.yml
          rm -f tools/issue4.patch.part* .github/workflows/apply-issue4.yml
          printf '%s\n' 'issue4-patch-applied' > .issue4-applied
          git add -A
          git config user.name 'AXIOM automation'
          git config user.email 'axiom-automation@users.noreply.github.com'
          git commit -m 'feat: add structured l-value mutation'
          git push origin HEAD:feature/4-structured-lvalue-mutation
