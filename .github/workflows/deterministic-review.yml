name: AXIOM deterministic review

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: deterministic-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deterministic-review:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out the exact pull-request head
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"

      - name: Install proof dependencies
        run: |
          python3 -m pip install --disable-pip-version-check -r requirements-proof.txt
          python3 -m pip check

      - name: Install Clang
        run: |
          sudo apt-get update
          sudo apt-get install --yes clang

      - name: Produce exact-head proof evidence
        run: python3 run_repo_proof.py

      - name: Run the deterministic review gate
        run: >
          python3 tools/run_deterministic_review.py
          --event "$GITHUB_EVENT_PATH"
          --output evidence/deterministic-review

      - name: Upload deterministic review artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: axiom-deterministic-review-${{ github.run_id }}
          path: evidence/deterministic-review/
          if-no-files-found: error
          retention-days: 14
