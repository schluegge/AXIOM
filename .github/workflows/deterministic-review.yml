name: AXIOM deterministic review

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: deterministic-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deterministic-review:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out the exact pull-request head
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"

      - name: Install proof dependencies
        run: |
          python3 -m pip install --disable-pip-version-check -r requirements-proof.txt
          python3 -m pip check

      - name: Install Clang
        run: |
          sudo apt-get update
          sudo apt-get install --yes clang

      - name: Produce exact-head proof evidence
        run: python3 run_repo_proof.py

      - name: Package exact-head proof evidence
        id: proof-artifact
        env:
          PROOF_ARTIFACT_NAME: axiom-repo-proof-${{ github.run_id }}.zip
        run: |
          python3 - <<'PY'
          import hashlib
          import os
          import zipfile
          from pathlib import Path

          source = Path("evidence/repo-proof")
          target = Path("evidence") / os.environ["PROOF_ARTIFACT_NAME"]
          if not source.is_dir():
              raise SystemExit("proof evidence directory is missing")
          with zipfile.ZipFile(target, "w", compression=zipfile.ZIP_STORED) as archive:
              for path in sorted(item for item in source.rglob("*") if item.is_file()):
                  info = zipfile.ZipInfo(path.relative_to(source).as_posix())
                  info.date_time = (1980, 1, 1, 0, 0, 0)
                  info.external_attr = 0o100644 << 16
                  archive.writestr(info, path.read_bytes())
          digest = hashlib.sha256(target.read_bytes()).hexdigest()
          with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as output:
              output.write(f"name={target.name}\n")
              output.write(f"digest=sha256:{digest}\n")
          PY

      - name: Run the deterministic review gate
        run: >
          python3 tools/run_deterministic_review.py
          --event "$GITHUB_EVENT_PATH"
          --output evidence/deterministic-review
          --workflow-run-id "${{ github.run_id }}"
          --workflow-run-attempt "${{ github.run_attempt }}"
          --proof-artifact-name "${{ steps.proof-artifact.outputs.name }}"
          --proof-artifact-digest "${{ steps.proof-artifact.outputs.digest }}"

      - name: Upload deterministic review artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: axiom-deterministic-review-${{ github.run_id }}
          path: |
            evidence/deterministic-review/
            evidence/axiom-repo-proof-${{ github.run_id }}.zip
          if-no-files-found: error
          retention-days: 14
