name: AXIOM deterministic review

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: deterministic-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deterministic-review:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out the exact pull-request head
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"

      - name: Install proof dependencies
        run: |
          python3 -m pip install --disable-pip-version-check -r requirements-proof.txt
          python3 -m pip check

      - name: Install Clang
        run: |
          sudo apt-get update
          sudo apt-get install --yes clang

      - name: Produce exact-head proof evidence
        run: python3 run_repo_proof.py

      - name: Package exact-head proof evidence
        id: proof-artifact
        env:
          PROOF_ARTIFACT_NAME: axiom-repo-proof-${{ github.run_id }}.zip
        run: |
          python3 - <<'PY'
          import hashlib
          import os
          import zipfile
          from pathlib import Path

          source = Path("evidence/repo-proof")
          target = Path("evidence") / os.environ["PROOF_ARTIFACT_NAME"]
          if not source.is_dir():
              raise SystemExit("proof evidence directory is missing")
          with zipfile.ZipFile(target, "w", compression=zipfile.ZIP_STORED) as archive:
              for path in sorted(item for item in source.rglob("*") if item.is_file()):
                  info = zipfile.ZipInfo(path.relative_to(source).as_posix())
                  info.date_time = (1980, 1, 1, 0, 0, 0)
                  info.external_attr = 0o100644 << 16
                  archive.writestr(info, path.read_bytes())
          digest = hashlib.sha256(target.read_bytes()).hexdigest()
          with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as output:
              output.write(f"name={target.name}\n")
              output.write(f"digest=sha256:{digest}\n")
          PY

      - name: Run the deterministic review gate
        env:
          PROOF_ARTIFACT_NAME: ${{ steps.proof-artifact.outputs.name }}
          PROOF_ARTIFACT_DIGEST: ${{ steps.proof-artifact.outputs.digest }}
        run: >
          python3 tools/run_deterministic_review.py
          --event "$GITHUB_EVENT_PATH"
          --output evidence/deterministic-review
          --workflow-run-id "${{ github.run_id }}"
          --workflow-run-attempt "${{ github.run_attempt }}"
          --proof-artifact-name "$PROOF_ARTIFACT_NAME"
          --proof-artifact-digest "$PROOF_ARTIFACT_DIGEST"

      - name: Verify publication inputs exist
        id: publication-inputs
        if: ${{ always() }}
        env:
          PROOF_ARTIFACT_NAME: ${{ steps.proof-artifact.outputs.name }}
        run: |
          echo "ready=false" >> "$GITHUB_OUTPUT"
          # steps.proof-artifact.outputs.name is trusted only when the named file exists.
          test -n "$PROOF_ARTIFACT_NAME" || exit 0
          test -f "evidence/$PROOF_ARTIFACT_NAME" || exit 0
          test -f evidence/deterministic-review/review-report.json || exit 0
          test -f evidence/deterministic-review/review-summary.md || exit 0
          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Bind review output to the workflow-run identity
        if: ${{ always() && steps.publication-inputs.outputs.ready == 'true' }}
        env:
          ARTIFACT_NAME: axiom-deterministic-review-${{ github.run_id }}
          WORKFLOW_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: >
          python3 tools/create_review_publication_envelope.py
          --event "$GITHUB_EVENT_PATH"
          --report evidence/deterministic-review/review-report.json
          --summary evidence/deterministic-review/review-summary.md
          --output evidence/deterministic-review/publication-envelope.json
          --workflow-run-id "${{ github.run_id }}"
          --workflow-run-attempt "${{ github.run_attempt }}"
          --workflow-name "${{ github.workflow }}"
          --workflow-run-url "$WORKFLOW_RUN_URL"
          --artifact-name "$ARTIFACT_NAME"

      - name: Stage root-bound publication artifact
        if: ${{ always() && steps.publication-inputs.outputs.ready == 'true' }}
        env:
          PROOF_ARTIFACT_NAME: ${{ steps.proof-artifact.outputs.name }}
        run: |
          rm -rf evidence/review-publication-artifact
          mkdir -p evidence/review-publication-artifact
          cp evidence/deterministic-review/publication-envelope.json evidence/review-publication-artifact/publication-envelope.json
          cp evidence/deterministic-review/review-report.json evidence/review-publication-artifact/review-report.json
          cp evidence/deterministic-review/review-summary.md evidence/review-publication-artifact/review-summary.md
          cp "evidence/$PROOF_ARTIFACT_NAME" "evidence/review-publication-artifact/$PROOF_ARTIFACT_NAME"

      - name: Upload deterministic review artifacts
        if: ${{ always() && steps.publication-inputs.outputs.ready == 'true' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: axiom-deterministic-review-${{ github.run_id }}
          path: evidence/review-publication-artifact/
          if-no-files-found: error
          retention-days: 14
