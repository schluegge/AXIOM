name: AXIOM proof

on:
  pull_request:
  push:
    branches:
      - main
      - "feature/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  proof:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"

      - name: Install proof dependencies
        run: |
          python3 -m pip install --disable-pip-version-check -r requirements-proof.txt
          python3 -m pip check

      - name: Install Clang
        run: |
          sudo apt-get update
          sudo apt-get install --yes clang

      - name: Record tool versions
        run: |
          mkdir -p evidence/ci-diagnostics
          {
            python3 --version
            clang --version
            python3 - <<'PY'
          from importlib.metadata import version
          for name in ["jsonschema", "attrs", "jsonschema-specifications", "referencing", "rpds-py", "typing-extensions"]:
              print(f"{name}=={version(name)}")
          PY
          } | tee evidence/ci-diagnostics/proof-dependency-versions.txt

      - name: Run release-blocking repository proof
        shell: bash
        run: |
          mkdir -p evidence/ci-diagnostics
          set +e
          python3 run_repo_proof.py > evidence/ci-diagnostics/proof.stdout.txt 2> evidence/ci-diagnostics/proof.stderr.txt
          status=$?
          set -e
          printf '%s\n' "$status" > evidence/ci-diagnostics/proof.exit-code.txt
          cat evidence/ci-diagnostics/proof.stdout.txt
          cat evidence/ci-diagnostics/proof.stderr.txt >&2
          exit "$status"

      - name: Upload proof evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: axiom-repo-proof-${{ github.run_id }}
          path: |
            evidence/AXIOM_REPO_PROOF_EVIDENCE.zip
            evidence/repo-proof/
            evidence/ci-diagnostics/
          if-no-files-found: error
          retention-days: 14
