name: AXIOM proof

on:
  pull_request:
  push:
    branches:
      - main
      - "feature/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  proof:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Clang
        run: |
          sudo apt-get update
          sudo apt-get install --yes clang

      - name: Record tool versions
        run: |
          python3 --version
          clang --version

      - name: Run release-blocking repository proof
        run: python3 run_repo_proof.py

      - name: Upload proof evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: axiom-repo-proof-${{ github.run_id }}
          path: |
            evidence/AXIOM_REPO_PROOF_EVIDENCE.zip
            evidence/repo-proof/
          if-no-files-found: warn
          retention-days: 14
