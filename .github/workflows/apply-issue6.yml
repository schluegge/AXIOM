name: Apply issue 6 source patch

on:
  push:
    branches:
      - feature/6-scoped-references
    paths:
      - "tools/issue6.ready"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Apply exact tested patch
        shell: bash
        run: |
          cat tools/issue6.chunk* > /tmp/issue6.patch
          printf '%s  %s\n' '8575e8f141972e3eac4a04164625674254a0373f76703401e4dcbab54760fc64' /tmp/issue6.patch | sha256sum --check
          git apply --index /tmp/issue6.patch
          git checkout origin/main -- .github/workflows/proof.yml
          rm -f tools/issue6.chunk* tools/issue6.patch.part* tools/issue6.ready .github/workflows/apply-issue6.yml
          printf '%s\n' 'issue6-patch-applied' > .issue6-applied
          git add -A
          git config user.name 'AXIOM automation'
          git config user.email 'axiom-automation@users.noreply.github.com'
          git commit -m 'feat: add scoped shared and mutable references'
          git push origin HEAD:feature/6-scoped-references
